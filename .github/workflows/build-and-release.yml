name: Build & Release APK

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Generate release tag
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}-build-$(date +'%Y%m%d')-${{ github.run_number }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🍦 Dondurma RSS Reader - ${{ steps.tag.outputs.tag }}

            **Branch:** `${{ github.ref_name }}`
            **Commit:** `${{ github.sha }}`
            **Build Date:** ${{ steps.tag.outputs.tag }}

            ### 📦 Assets
            - `app-release.apk` — Android release build
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
